name: reusable-docker

on:
  workflow_call:
    inputs:
      image_name:
        type: string
        required: true
      registry:
        type: string
        required: false
        default: ghcr
      registry-url:
        type: string
        required: false
        default: ""
      semver:
        type: string
        required: false
        default: ""
      dockerfile:
        type: string
        required: false
        default: Dockerfile
      context:
        type: string
        required: false
        default: .
      push:
        type: boolean
        required: false
        default: true
      aws-region:
        type: string
        required: false
        default: us-east-1
      aws-account-id:
        type: string
        required: false
        default: ""
      aws-role-to-assume:
        type: string
        required: false
        default: ""
      azure-client-id:
        type: string
        required: false
        default: ""
      azure-tenant-id:
        type: string
        required: false
        default: ""
      azure-subscription-id:
        type: string
        required: false
        default: ""
      provenance:
        type: boolean
        required: false
        default: true
    outputs:
      image-uri:
        value: ${{ jobs.container.outputs.image-uri }}
      image-tag:
        value: ${{ jobs.container.outputs.image-tag }}
      image-digest:
        value: ${{ jobs.container.outputs.image-digest }}

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  container:
    runs-on: ubuntu-latest
    outputs:
      image-uri: ${{ steps.tags.outputs.primary_tag }}
      image-tag: ${{ steps.tags.outputs.primary_tag }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - id: registry-meta
        name: Resolve registry endpoint
        shell: bash
        run: |
          set -euo pipefail
          case "${{ inputs.registry }}" in
            ghcr)
              echo "endpoint=ghcr.io/${GITHUB_REPOSITORY_OWNER}" >> "$GITHUB_OUTPUT"
              ;;
            ecr)
              if [[ -z "${{ inputs.aws-account-id }}" ]]; then
                echo "aws-account-id input is required for ECR" >&2
                exit 1
              fi
              echo "endpoint=${{ inputs.aws-account-id }}.dkr.ecr.${{ inputs.aws-region }}.amazonaws.com" >> "$GITHUB_OUTPUT"
              ;;
            acr)
              if [[ -z "${{ inputs['registry-url'] }}" ]]; then
                echo "registry-url input is required for ACR" >&2
                exit 1
              fi
              echo "endpoint=${{ inputs['registry-url'] }}" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported registry '${{ inputs.registry }}'" >&2
              exit 1
              ;;
          esac

      - name: Configure AWS OIDC credentials
        if: ${{ inputs.registry == 'ecr' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.aws-role-to-assume }}
          aws-region: ${{ inputs.aws-region }}

      - name: Login to Amazon ECR
        if: ${{ inputs.registry == 'ecr' }}
        uses: aws-actions/amazon-ecr-login@v2

      - name: Login to GHCR
        if: ${{ inputs.registry == 'ghcr' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Azure login (OIDC)
        if: ${{ inputs.registry == 'acr' }}
        uses: azure/login@v2
        with:
          client-id: ${{ inputs.azure-client-id }}
          tenant-id: ${{ inputs.azure-tenant-id }}
          subscription-id: ${{ inputs.azure-subscription-id }}

      - name: Login to Azure Container Registry
        if: ${{ inputs.registry == 'acr' }}
        shell: bash
        run: |
          set -euo pipefail
          registry_name="${{ inputs['registry-url'] }}"
          registry_name="${registry_name%%.*}"
          az acr login --name "$registry_name"

      - id: tags
        uses: ./.github/actions/generate-image-tags
        with:
          image: ${{ steps.registry-meta.outputs.endpoint }}/${{ inputs.image_name }}
          semver: ${{ inputs.semver }}
          sha: ${{ github.sha }}

      - id: build
        name: Docker build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: ${{ inputs.push }}
          tags: ${{ steps.tags.outputs.tags }}
          provenance: ${{ inputs.provenance }}

      - name: Container vulnerability scan (HIGH/CRITICAL)
        if: ${{ inputs.push }}
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ steps.tags.outputs.primary_tag }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Install Cosign
        if: ${{ inputs.push }}
        uses: sigstore/cosign-installer@v4

      - name: Sign image with keyless OIDC
        if: ${{ inputs.push }}
        env:
          COSIGN_EXPERIMENTAL: "1"
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            cosign sign --yes "$tag@${{ steps.build.outputs.digest }}"
          done <<< "${{ steps.tags.outputs.tags }}"

      - name: Generate SLSA provenance attestation
        if: ${{ inputs.provenance && inputs.push }}
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ steps.tags.outputs.primary_tag }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
